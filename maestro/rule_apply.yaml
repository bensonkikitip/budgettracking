appId: com.kiip.slonready
---
# Precondition: onboarding done, Feb 2026 transactions imported (includes STARBUCKS).
- runFlow: "onboarding_new_user.yaml"

# ── Navigate to Rules screen via the ••• menu ─────────────────────────────────
- tapOn: "•••"
- tapOn: "Rules"
- assertVisible: "Rules"

# ── Tap "Add" in the header to open the rule creation sheet ──────────────────
- tapOn: "Add"
# Skip assertVisible: "Add Rule" — Modal accessibility settle is unreliable.
# tapOn below has built-in retry and acts as the implicit sheet-open assertion.

# ── Fill in the match text ────────────────────────────────────────────────────
# TextInput has accessibilityLabel="Text to match" (placeholder isn't accessible in iOS).
- tapOn: "Text to match"
- inputText: "starbucks"
# Press Done to dismiss the iOS keyboard (TextInput has returnKeyType="done").
- pressKey: enter

# ── Assign a category ────────────────────────────────────────────────────────
# The dropdown header has accessibilityLabel="Select category" (regardless of current value).
- tapOn: "Select category"
- assertVisible: "Groceries"
- tapOn: "Groceries"

# ── Save the rule ─────────────────────────────────────────────────────────────
# The button has accessibilityLabel="Save rule" to distinguish it from the "Add Rule" title.
- tapOn: "Save rule"

# ── Alert: "Rule saved!" — tap Apply Now to categorize existing transactions ──
- assertVisible: "Rule saved!"
- tapOn: "Apply Now"

# ── Second alert: "Done!" — confirms how many transactions were categorized ───
- assertVisible: "Done!"
- tapOn: "OK"

# ── Back on rules list — the new rule should appear ───────────────────────────
# ruleInfo TouchableOpacity has accessibilityLabel: `Contains "starbucks" → Groceries`
- assertVisible: 'Contains "starbucks" → Groceries'
