appId: com.kiip.slonready
---
# Precondition: onboarding done, Feb 2026 transactions imported.
- runFlow: "onboarding_new_user.yaml"

# ── Screen: account/[id] — transaction list ───────────────────────────────────
# Tap STARBUCKS to open the edit screen.
- tapOn: "STARBUCKS #12345 SANTA BARBARA CA"

# ── Screen: tx-edit ───────────────────────────────────────────────────────────
- assertVisible: "Edit Transaction"

# Source badge shows "Imported" because source_is_manual = 0.
- assertVisible: "Imported"

# ── Edit the description ──────────────────────────────────────────────────────
# Triple-tap selects all existing text in the field, then inputText replaces it.
- tapOn: "Description field"
- clearText
- inputText: "Starbucks Coffee"

# ── Edit the amount ───────────────────────────────────────────────────────────
- tapOn: "Amount field"
- clearText
- inputText: "-7.00"

# ── Save ─────────────────────────────────────────────────────────────────────
- tapOn: "Save Changes"

# ── Back on account detail — verify updated description in list ───────────────
# The account list reloads via useFocusEffect on returning to focus.
# TransactionRow accessibilityLabel = description (no category yet).
- assertVisible: "Starbucks Coffee"

# ── Delete flow — soft-drop an imported transaction ───────────────────────────
# Tap the ARCO row (imported, source_is_manual = 0 → soft drop path).
- tapOn: "ARCO #42448 GOLETA CA"
- assertVisible: "Edit Transaction"
- tapOn: "Delete Transaction"

# ── Alert: "Delete transaction?" — confirm ────────────────────────────────────
# Imported tx alert says "This will hide the transaction from your account."
- assertVisible: "Delete transaction?"
- tapOn: "Delete"

# ── Back on account detail — ARCO row is still visible but marked Dropped ─────
# Soft-dropped transactions remain in the list with a "· Dropped" source badge.
# Verify by re-opening the row.
- tapOn: "ARCO #42448 GOLETA CA"
- assertVisible: "Edit Transaction"
- assertVisible: "Dropped"
- tapOn: "Back"
